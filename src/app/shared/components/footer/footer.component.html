<footer class="footer-container mt-md-10 mt-5 bg-green text-white py-8">
  <div class="footer-content-container d-flex justify-content-center align-items-start">
    <div class="logo-container">
      <img
        src="assets/img/logo-limago-reflexo-blanc.webp"
        alt="Limago Reflexo logo"
        class="logo-footer"
        loading="lazy"
      >
    </div>

    <div class="footer-sections d-flex justify-content-between">
      <div class="footer-section px-lg-13">
        <h5 class="footer-title mb-4">
          <ng-container *ngIf="lang === 'fr'">Où me trouver</ng-container>
          <ng-container *ngIf="lang === 'en'">Find me</ng-container>
        </h5>
        <p class="footer-content">
          <ng-container *ngIf="lang === 'fr'">
            A mon domicile<br>à Castillonnès<br>Lot-et-Garonne
          </ng-container>
          <ng-container *ngIf="lang === 'en'">
            At my home<br>in Castillonnès<br>Lot-et-Garonne
          </ng-container>
        </p>
      </div>

      <div class="footer-section px-lg-13">
        <h5 class="footer-title mb-4">
          <ng-container *ngIf="lang === 'fr'">Pour me contacter</ng-container>
          <ng-container *ngIf="lang === 'en'">Contact me</ng-container>
        </h5>
        <p class="footer-content">
          06.81.00.20.05<br>limago.reflexo&#64;gmail.com
        </p>
      </div>

      <div class="footer-section px-lg-10">
        <h5 class="footer-title mb-6">
          <ng-container *ngIf="lang === 'fr'">Me suivre</ng-container>
          <ng-container *ngIf="lang === 'en'">Follow me</ng-container>
        </h5>

        <div class="social-icons">
          <!-- Remplace # par tes vraies URLs quand tu les as -->
          <a href="#" (click)="$event.preventDefault()" rel="noopener noreferrer">
            <img
              src="assets/img/instagram-blanc.webp"
              alt="Instagram"
              class="social-icon mx-3"
              loading="lazy"
            >
          </a>
          <a href="#" (click)="$event.preventDefault()" rel="noopener noreferrer">
            <img
              src="assets/img/facebook-blanc.webp"
              alt="Facebook"
              class="social-icon mx-3"
              loading="lazy"
            >
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="legal-section border-top my-md-2 my-2">
    <div class="legal-box col-12 mt-md-6 mx-7 d-flex justify-content-center">

      <a
        [routerLink]="['/politique-de-confidentialite']"
        class="footer-link text-fs-30"
        (click)="debugClick('PRIVACY', $event)">
        <ng-container *ngIf="lang === 'fr'">Politique de confidentialité</ng-container>
        <ng-container *ngIf="lang === 'en'">Privacy policy</ng-container>
      </a>

      <a
        [routerLink]="['/mentions-legales']"
        class="footer-link text-fs-30"
        (click)="debugClick('LEGAL', $event)">
        <ng-container *ngIf="lang === 'fr'">Mentions légales</ng-container>
        <ng-container *ngIf="lang === 'en'">Legal notice</ng-container>
      </a>

      <a [routerLink]="['/conditions-generales-de-vente']" class="footer-link text-fs-30">
        <ng-container *ngIf="lang === 'fr'">CGV</ng-container>
        <ng-container *ngIf="lang === 'en'">Terms &amp; Conditions</ng-container>
      </a>

    </div>
  </div>
</footer>
